# Sandy — Restricted Token Config Template
# ============================================================
# Restricted token mode uses restricting SIDs + Low integrity instead
# of AppContainer. Use this mode when your app needs named pipe creation
# (Flutter, Chromium, Mojo IPC frameworks).
#
# Trade-offs vs AppContainer:
#   + Named pipe creation (configurable)
#   + Registry grants (configurable)
#   - No network isolation (unrestricted)
#   - No object namespace isolation (shared)
#   - System directories always readable

[sandbox]
token = 'restricted'
integrity = 'low'        # required: 'low' or 'medium'
workdir = 'inherit'      # required: absolute path or 'inherit' (= exe folder)

# ============================================================
# ACCESS — File and folder grants (optional)
# ============================================================
# Grant the sandboxed process access to specific folders or files.
# Use single quotes for Windows paths (no backslash escaping needed).

[allow]
peek    = []              # non-recursive: list dir + stat only (path traversal)
read = []
write = []
execute = []
append = []
delete = []
all = []

# ============================================================
# PERMISSIONS — All keys mandatory per mode
# ============================================================
# Every key must be explicitly set. Omitting a key is a parse error.

[deny]
read    = []
write   = []
execute = []
append  = []
delete  = []
all     = []

[privileges]
named_pipes     = false   # allow named pipe creation (CreateNamedPipeW)
stdin           = false   # true = inherit, false = disabled (NUL), or a file path
clipboard_read  = false   # allow reading from clipboard
clipboard_write = false   # allow writing to clipboard
child_processes = true    # allow spawning child processes (kernel-enforced)

# NOTE: network, localhost, lan, system_dirs are not available in restricted mode.
# Restricted tokens have no capability-based network model — network
# access is unrestricted. System dirs are always readable via BUILTIN\Users.

# ============================================================
# REGISTRY — Registry key grants (optional, restricted only)
# ============================================================
# Most registry keys (HKLM\Software, HKCU) are already readable by
# default — BUILTIN\Users is in the restricting SID list, and most
# keys grant Users read access in their DACLs.
# Use this section primarily to grant write access to specific keys.

[registry]
read = []
write = []

# ============================================================
# ENVIRONMENT — inherit is mandatory
# ============================================================

[environment]
inherit = true                            # required: true or false
pass = []                                 # required: [] or ['PATH', 'PYTHONPATH']

# ============================================================
# RESOURCE LIMITS — all keys required (0 = unlimited)
# ============================================================

[limit]
timeout = 0        # 0 = no timeout, positive = kill after N seconds
memory = 0         # 0 = no cap, positive = limit in MB
processes = 0      # 0 = no cap, positive = max active processes
