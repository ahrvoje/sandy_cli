# Sandy — Restricted Token Config Template
# ============================================================
# Restricted token mode uses restricting SIDs + configurable integrity
# instead of AppContainer. Use this mode when your app needs named pipe
# creation (Flutter, Chromium, Mojo IPC frameworks).
#
# Trade-offs vs AppContainer:
#   + Named pipe creation (configurable)
#   + Registry grants (configurable)
#   - No network isolation (unrestricted)
#   - No object namespace isolation (shared)
#   - System directories always readable
#
# Only [sandbox] token + integrity are required. All other sections
# are optional with safe defaults.

[sandbox]
token = 'restricted'
integrity = 'low'          # required: 'low' or 'medium'
# workdir = 'inherit'      # optional (default: exe folder)

# ============================================================
# ACCESS — File and folder grants (optional, default: no grants)
# ============================================================

# [allow.deep]
# peek    = []              # non-recursive: list dir + stat only
# read    = []              # read files, list dirs (recursive)
# write   = []              # create/modify files (recursive)
# execute = []              # read + execute (recursive)
# append  = []              # append only (recursive)
# delete  = []              # delete only (recursive)
# all     = []              # full access (recursive)

# [deny.deep]                    # optional, default: no denies

# ============================================================
# PRIVILEGES — Optional, safe defaults shown
# ============================================================

# [privileges]
# named_pipes     = false   # default false: no named pipe creation
# stdin           = false   # default false (NUL). true=inherit, path=file
# clipboard_read  = false   # default false
# clipboard_write = false   # default false
# child_processes = true    # default true

# NOTE: network, localhost, lan, system_dirs are not available in
# restricted mode. Network is always unrestricted, system dirs are
# always readable via BUILTIN\Users.

# ============================================================
# REGISTRY — Registry key grants (optional, default: no grants)
# ============================================================

# [registry]
# read = ['HKCU\Software\MyApp']
# write = ['HKCU\Software\MyApp\Settings']

# ============================================================
# ENVIRONMENT — Optional, default: filtered
# ============================================================

# [environment]
# inherit = false            # default false (clean environment)
# pass = []                  # default [] (pass no extra variables)

# ============================================================
# RESOURCE LIMITS — Optional, default: unlimited (0)
# ============================================================

# [limit]
# timeout = 0               # 0 = no timeout
# memory = 0                # 0 = no cap (MB)
# processes = 0             # 0 = no cap
