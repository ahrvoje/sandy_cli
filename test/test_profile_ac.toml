# Sandy profile test configuration — AppContainer
# Minimal config for profile creation/run tests

[sandbox]
token = 'appcontainer'
workdir = 'inherit'

[allow]
peek    = []
read    = ['C:\Users\H\test_sandy_profile\data']
write   = []
execute = ['C:\Users\H\AppData\Local\Programs\Python\Python314']
append  = []
delete  = []
all     = []

[deny]
read    = []
write   = []
execute = []
append  = []
delete  = []
all     = []

[privileges]
system_dirs = true
network = false
localhost = false
lan = false
stdin = false
clipboard_read = false
clipboard_write = false
child_processes = true

[environment]
inherit = true
pass = []

[limit]
timeout = 30
memory = 0
processes = 0
