# Sandy sandbox test configuration — Restricted Token mode
# Used by: sandy.exe -c test_sandy_restricted_config.toml -x <python.exe> test_sandy.py

[sandbox]
token = 'restricted'
integrity = 'medium'
workdir = 'inherit'

[access]
read = [
    'C:\Users\H\AppData\Local\Programs\Python\Python314',
    'C:\repos\sandy_cli\',
    'C:\repos\sandy_cli\test',
    'C:\Users\H\test_R',
    'C:\Users\H\test_file_R.txt',
]
write = [
    'C:\Users\H\test_W',
    'C:\Users\H\test_file_W.txt',
]
execute = []
append = []
delete = []
all = [
    'C:\Users\H\test_RW',
    'C:\Users\H\test_file_RW.txt',
]

[allow]
named_pipes = false
stdin = false
clipboard_read = false
clipboard_write = false
child_processes = true

[environment]
inherit = true
pass = []

[registry]
read = []
write = []

[limit]
timeout = 0
memory = 0
processes = 0
