# Sandy sandbox test configuration — Restricted Token mode
# Used by: sandy.exe -c test_sandy_restricted_config.toml -x <python.exe> test_sandy.py
# Sandy sandbox test configuration — Restricted Token mode
# Used by: sandy.exe -c test_sandy_restricted_config.toml -x <python.exe> test_sandy.py

[sandbox]
token = 'restricted'
integrity = 'medium'

[allow]
read = [
    'C:\Users\H\AppData\Local\Programs\Python\Python314',
    'C:\Users\H\test_sandy\scripts',
    'C:\Users\H\test_sandy\R',
    'C:\Users\H\test_sandy\file_R.txt',
]
write = [
    'C:\Users\H\test_sandy\W',
    'C:\Users\H\test_sandy\file_W.txt',
]
all = [
    'C:\Users\H\test_sandy\RW',
    'C:\Users\H\test_sandy\file_RW.txt',
]
[environment]
inherit = true
