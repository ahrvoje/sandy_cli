# Phantom test config — Restricted Token mode
# Theme: persistence, observation, and cleanup interference

[sandbox]
token = 'restricted'
integrity = 'medium'

[allow]
read = ['C:\Users\H\AppData\Local\Programs\Python\Python314', 'C:\Users\H\test_phantom\scripts']
all = ['C:\Users\H\test_phantom\arena']

[deny]
all = ['C:\Users\H\test_phantom\arena\forbidden']
write = ['C:\Users\H\test_phantom\arena\readonly']

[privileges]
child_processes = false
[limit]
timeout = 90
