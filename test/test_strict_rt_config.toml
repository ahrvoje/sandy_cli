# Sandy test configuration — strict mode test, Restricted Token mode
# No execute grant, so nothing should be able to run.

[sandbox]
token = 'restricted'
integrity = 'medium'

[allow]
read = [
    'C:\Users\H\AppData\Local\Programs\Python\Python314',
    'C:\Users\H\test_limits\scripts',
]
[environment]
inherit = true
