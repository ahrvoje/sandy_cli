# Sandy test configuration — strict mode test, Restricted Token mode
# No execute grant, so nothing should be able to run.

[sandbox]
token = 'restricted'
integrity = 'medium'
workdir = 'inherit'

[allow]
read = [
    'C:\Users\H\AppData\Local\Programs\Python\Python314',
    'C:\Users\H\test_limits\scripts',
]
write = []
execute = []
append = []
delete = []
all = []

[deny]
read    = []
write   = []
execute = []
append  = []
delete  = []
all     = []

[privileges]
named_pipes = false
stdin = false
clipboard_read = false
clipboard_write = false
child_processes = true

[registry]
read = []
write = []

[environment]
inherit = true
pass = []

[limit]
timeout = 0
memory = 0
processes = 0
