# Phantom test config (AC, no deny)
# Theme: persistence, observation, and cleanup interference
#
# arena/
#   workspace/   [allow all] — writable zone for test fixtures
#   forbidden/   (no grant — fully blocked)
#   readonly/    [allow read]

[sandbox]
token = 'appcontainer'

[allow]
execute = ['C:\Users\H\AppData\Local\Programs\Python\Python314']
read = ['C:\Users\H\test_phantom\scripts', 'C:\Users\H\test_phantom\arena\readonly']
peek = ['C:\Users\H\test_phantom\arena']
all = ['C:\Users\H\test_phantom\arena\workspace']

[privileges]
child_processes = false
[limit]
timeout = 90
