# Theme: persistence, observation, and cleanup interference
#
# arena/
#   forbidden/     (no grant — fully blocked)
#   readonly/      [allow read] — was deny.write

[sandbox]
token = 'appcontainer'

[allow]
execute = ['C:\Users\H\AppData\Local\Programs\Python\Python314']
