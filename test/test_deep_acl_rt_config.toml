# Deep ACL test — Restricted Token mode
# 4 levels, heterogeneous overlapping allow/deny grants
#
# TREE (4 levels deep):
#   test_deep/
#     app/                        [allow] all  (L1)
#       src/                      inherits all (L2)
#         core/                   [deny] write (L3)
#           engine/               inherits deny (L4)
#         contrib/                [deny] all (L3)
#           plugins/              inherits deny (L4)
#       docs/                     inherits all (L2)
#         public/                 inherits all (L3)
#           guides/               inherits all (L4)
#         classified/             [deny] read (L3)
#           memos/                inherits deny (L4)
#     library/                    [allow] read (L1)
#       stable/                   inherits read (L2)
#         v1/                     inherits read (L3)
#       experimental/             [deny] read (L2)
#         beta/                   inherits deny (L3)
#     scripts/                    [allow] execute (L1)
#       common/                   inherits execute (L2)
#         utils/                  inherits execute (L3)
#       restricted/               [deny] execute (L2)
#         admin/                  inherits deny (L3)

[sandbox]
token = 'restricted'
integrity = 'medium'
workdir = 'inherit'

[allow]
peek    = []
execute = ['C:\Users\H\test_deep\scripts']
read = ['C:\Users\H\AppData\Local\Programs\Python\Python314', 'C:\Users\H\test_deep\scripts', 'C:\Users\H\test_deep\library']
write = []
append = []
delete = []
all = ['C:\Users\H\test_deep\app']

[deny]
write   = ['C:\Users\H\test_deep\app\src\core']
all     = ['C:\Users\H\test_deep\app\src\contrib']
read    = ['C:\Users\H\test_deep\app\docs\classified', 'C:\Users\H\test_deep\library\experimental']
execute = ['C:\Users\H\test_deep\scripts\restricted']
append  = []
delete  = []

[privileges]
named_pipes = false
stdin = false
clipboard_read = false
clipboard_write = false
child_processes = true

[registry]
read = []
write = []

[environment]
inherit = true
pass = []

[limit]
timeout = 60
memory = 0
processes = 0
