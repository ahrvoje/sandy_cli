# Expert adversarial test config — Restricted Token mode
#
# TREE (created by batch runner):
#   test_expert/
#     arena/                        [allow all]
#       denied_zone/                [deny all]
#       readonly_zone/              [deny write]
#       double_deny/                [deny write + deny read]
#       deep/a/b/c/d/               [deny all]
#       playground/                 inherits all
#     scripts/                      [allow read]

[sandbox]
token = 'restricted'
integrity = 'medium'

[allow]
read = ['C:\Users\H\AppData\Local\Programs\Python\Python314', 'C:\Users\H\test_expert\scripts']
all = ['C:\Users\H\test_expert\arena']

[deny]
all = [
    'C:\Users\H\test_expert\arena\denied_zone',
    'C:\Users\H\test_expert\arena\deep\a\b\c\d',
]
write = [
    'C:\Users\H\test_expert\arena\readonly_zone',
    'C:\Users\H\test_expert\arena\double_deny',
]
read = [
    'C:\Users\H\test_expert\arena\double_deny',
]

[privileges]
child_processes = false
[limit]
timeout = 90
