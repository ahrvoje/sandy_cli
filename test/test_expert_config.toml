# Expert adversarial test config (AC, no deny)
#
# TREE:
#   test_expert/
#     arena/
#       denied_zone/                (no grant — fully blocked)
#       readonly_zone/              [allow read] (was deny.write)
#       double_deny/                (no grant — was deny write+read)
#       deep/a/b/c/                 [allow all]
#         d/                        (no grant — was deny.all)
#       playground/                 [allow all]
#     scripts/                      [allow read]

[sandbox]
token = 'appcontainer'

[allow.deep]
execute = ['C:\Users\H\AppData\Local\Programs\Python\Python314']
read = ['C:\Users\H\test_expert\scripts', 'C:\Users\H\test_expert\arena\readonly_zone']
all = ['C:\Users\H\test_expert\arena\playground', 'C:\Users\H\test_expert\arena\deep\a\b\c']

[privileges]
child_processes = false
[limit]
timeout = 90
