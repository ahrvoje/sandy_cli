# Sandy test configuration — allow & limits tests
# Tests: network=true and resource limits. system_dirs must remain
# true for Python to load its DLLs. Strict mode is tested separately.

[sandbox]
token = 'appcontainer'
workdir = 'inherit'

[access]
read = [
    'C:\Users\H\AppData\Local\Programs\Python\Python314',
    'C:\repos\sandy_cli\',
]
write = []
execute = []
append = []
delete = []
all = []

[allow]
system_dirs = true
network = true
localhost = false
lan = false
stdin = false
clipboard_read = false
clipboard_write = false
child_processes = true

[environment]
inherit = true
pass = []

[limit]
timeout = 5
memory = 128
processes = 3
