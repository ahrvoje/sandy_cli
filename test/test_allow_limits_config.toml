# Sandy test configuration — allow & limits tests
# All scripts live in %USERPROFILE%\test_limits\scripts

[sandbox]
token = 'appcontainer'
workdir = 'inherit'

[allow]
read = [
    'C:\Users\H\AppData\Local\Programs\Python\Python314',
    'C:\Users\H\test_limits\scripts',
]
write = []
execute = []
append = []
delete = []
all = []

[deny]
read    = []
write   = []
execute = []
append  = []
delete  = []
all     = []

[privileges]
system_dirs = true
network = true
localhost = false
lan = false
stdin = false
clipboard_read = false
clipboard_write = false
child_processes = true

[environment]
inherit = true
pass = []

[limit]
timeout = 5
memory = 128
processes = 3
