# Sandy sandbox test configuration
# Used by: sandy.exe -c test_sandy_config.toml -x <python.exe> test_sandy.py

[sandbox]
token = 'appcontainer'
workdir = 'inherit'

[access]
read = [
    'C:\repos\sandy_cli\',
    'C:\Users\H\test_R',
    'C:\Users\H\test_file_R.txt',
]
write = [
    'C:\Users\H\test_W',
    'C:\Users\H\test_file_W.txt',
]
execute = [
    'C:\Users\H\AppData\Local\Programs\Python\Python314',
]
append = []
delete = []
all = [
    'C:\Users\H\test_RW',
    'C:\Users\H\test_file_RW.txt',
]

[allow]
system_dirs = true
network = false
localhost = false
lan = false
stdin = false
clipboard_read = false
clipboard_write = false
child_processes = true

[environment]
inherit = true
pass = []

[limit]
timeout = 0
memory = 0
processes = 0
