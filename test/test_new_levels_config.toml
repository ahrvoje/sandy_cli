# Test config for new access levels: run, stat, touch, create
#
# FOLDER TREE:
#   test_new_levels/
#     scripts/        [allow.deep] read — holds the test script
#     run_dir/        [allow.deep] run  — execute only, no file reading
#     stat_dir/       [allow.deep] stat — attributes only (non-recursive)
#     touch_dir/      [allow.deep] touch — modify attributes only (non-recursive)
#     create_dir/     [allow.deep] create — create new files, no overwrite/read

[sandbox]
token = 'appcontainer'

[allow.deep]
execute = ['C:\Users\H\AppData\Local\Programs\Python\Python314']
read = ['C:\Users\H\test_new_levels\scripts']
run = ['C:\Users\H\test_new_levels\run_dir']
stat = ['C:\Users\H\test_new_levels\stat_dir']
touch = ['C:\Users\H\test_new_levels\touch_dir']
create = ['C:\Users\H\test_new_levels\create_dir']

[environment]
inherit = true

[limit]
timeout = 30
