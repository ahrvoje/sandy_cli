# Sandy test configuration — strict mode test
# system_dirs is false (strict), so no executable should be able to run.
# Scripts folder is granted read but system dirs are blocked.

[sandbox]
token = 'appcontainer'
workdir = 'inherit'

[allow]
read = [
    'C:\Users\H\AppData\Local\Programs\Python\Python314',
    'C:\Users\H\test_limits\scripts',
]
write = []
execute = []
append = []
delete = []
all = []

[deny]
read    = []
write   = []
execute = []
append  = []
delete  = []
all     = []

[privileges]
system_dirs = false  # strict isolation — no system dir access
network = false
localhost = false
lan = false
stdin = false
clipboard_read = false
clipboard_write = false
child_processes = true

[environment]
inherit = true
pass = []

[limit]
timeout = 0
memory = 0
processes = 0
