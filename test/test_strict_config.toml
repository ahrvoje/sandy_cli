# Sandy test configuration — LPAC mode test
# Uses token = 'lpac' (opts out of ALL APPLICATION PACKAGES),
# so no executable should be able to run without explicit grants.
# Scripts folder is granted read but App. Packages access is excluded.

[sandbox]
token = 'lpac'

[allow.deep]
read = [
    'C:\Users\H\AppData\Local\Programs\Python\Python314',
    'C:\Users\H\test_limits\scripts',
]

[environment]
inherit = true
