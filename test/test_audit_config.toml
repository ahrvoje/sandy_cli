# Sandy audit crash test configuration
# Deliberately restrictive: read-only access to Python + repo + test dir.
# No write access anywhere — forces the test script to crash.

[sandbox]
token = 'appcontainer'
workdir = 'inherit'

[access]
read = [
    'C:\Users\H\AppData\Local\Programs\Python\Python314',
    'C:\repos\sandy_cli\test',
]
write = []
execute = []
append = []
delete = []
all = []

[allow]
system_dirs = true
network = false
localhost = false
lan = false
stdin = false
clipboard_read = false
clipboard_write = false
child_processes = true

[environment]
inherit = true
pass = []

[limit]
timeout = 0
memory = 0
processes = 0
