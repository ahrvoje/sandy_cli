# Sandy audit crash test configuration
# Deliberately restrictive: read-only access to Python + repo + test dir.
# No write access anywhere — forces the test script to crash.
# Sandy audit crash test configuration
# Deliberately restrictive: read-only access to Python + repo + test dir.
# No write access anywhere — forces the test script to crash.

[sandbox]
token = 'appcontainer'

[allow]
read = [
    'C:\Users\H\AppData\Local\Programs\Python\Python314',
    'C:\Users\H\test_audit\scripts',
]
[environment]
inherit = true

[limit]
timeout = 30
