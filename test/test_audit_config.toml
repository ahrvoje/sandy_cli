# Sandy audit crash test configuration
# Deliberately restrictive: read-only access to Python + repo + test dir.
# No write access anywhere — forces the test script to crash.
# Sandy audit crash test configuration
# Deliberately restrictive: read-only access to Python + repo + test dir.
# No write access anywhere — forces the test script to crash.

[sandbox]
token = 'appcontainer'
workdir = 'inherit'

[allow]
read = [
    'C:\Users\H\AppData\Local\Programs\Python\Python314',
    'C:\Users\H\test_audit\scripts',
]
write = []
execute = []
append = []
delete = []
all = []

[deny]
read    = []
write   = []
execute = []
append  = []
delete  = []
all     = []

[privileges]
system_dirs = true
network = false
localhost = false
lan = false
stdin = false
clipboard_read = false
clipboard_write = false
child_processes = true

[environment]
inherit = true
pass = []

[limit]
timeout = 30
memory = 0
processes = 0
