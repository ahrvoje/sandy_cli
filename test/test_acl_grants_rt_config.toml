# Complex ACL grants test — Restricted Token mode
#
# FOLDER TREE:
#   test_acl/
#     workspace/          [allow] all
#       src/              (inherits all)
#       build/            [deny] write → read OK, write blocked
#       secrets/          [deny] all → everything blocked
#     data/               [allow] read
#       public/           (inherits read)
#       private/          [deny] read → fully blocked (deny > allow)
#     logs/               [allow] append
#     tools/              [allow] execute → read+exec, no write

[sandbox]
token = 'restricted'
integrity = 'medium'
workdir = 'inherit'

[allow]
execute = ['C:\Users\H\test_acl\tools']
read = ['C:\Users\H\AppData\Local\Programs\Python\Python314', 'C:\Users\H\test_acl\scripts', 'C:\Users\H\test_acl\data']
write = []
append = ['C:\Users\H\test_acl\logs']
delete = []
all = ['C:\Users\H\test_acl\workspace']

[deny]
read    = ['C:\Users\H\test_acl\data\private']
write   = ['C:\Users\H\test_acl\workspace\build']
execute = []
append  = []
delete  = []
all     = ['C:\Users\H\test_acl\workspace\secrets']

[privileges]
named_pipes = false
stdin = false
clipboard_read = false
clipboard_write = false
child_processes = true

[registry]
read = []
write = []

[environment]
inherit = true
pass = []

[limit]
timeout = 30
memory = 0
processes = 0
