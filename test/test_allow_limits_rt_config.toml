# Sandy test configuration — allow & limits tests, Restricted Token mode
# All scripts live in %USERPROFILE%\test_limits\scripts

[sandbox]
token = 'restricted'
integrity = 'medium'
workdir = 'inherit'

[allow]
peek    = []
read = [
    'C:\Users\H\AppData\Local\Programs\Python\Python314',
    'C:\Users\H\test_limits\scripts',
]
write = []
execute = []
append = []
delete = []
all = []

[deny]
read    = []
write   = []
execute = []
append  = []
delete  = []
all     = []

[privileges]
named_pipes = false
stdin = false
clipboard_read = false
clipboard_write = false
child_processes = true

[registry]
read = []
write = []

[environment]
inherit = true
pass = []

[limit]
timeout = 5
memory = 128
processes = 3
