# Mixed AC+RT test — AppContainer instance config (AC, no deny)
# Grants all on shared/workspace, read on shared/protected

[sandbox]
token = 'appcontainer'

[allow.deep]
execute = ['C:\Users\H\AppData\Local\Programs\Python\Python314']
read = ['C:\Users\H\test_mixed\scripts', 'C:\Users\H\test_mixed\shared\protected']
all = ['C:\Users\H\test_mixed\shared\workspace']

[environment]
inherit = true

[limit]
timeout = 30
