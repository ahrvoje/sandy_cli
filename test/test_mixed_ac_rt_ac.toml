# Mixed AC+RT test — AppContainer instance config
# Grants all on test_mixed/shared, read on test_mixed/scripts,
# deny write on test_mixed/shared/protected

[sandbox]
token = 'appcontainer'
workdir = 'inherit'

[allow]
peek    = []
execute = ['C:\Users\H\AppData\Local\Programs\Python\Python314']
read = ['C:\Users\H\test_mixed\scripts']
write = []
append = []
delete = []
all = ['C:\Users\H\test_mixed\shared']

[deny]
read    = []
write   = ['C:\Users\H\test_mixed\shared\protected']
execute = []
append  = []
delete  = []
all     = []

[privileges]
system_dirs = true
network = false
localhost = false
lan = false
stdin = false
clipboard_read = false
clipboard_write = false
child_processes = true

[environment]
inherit = true
pass = []

[limit]
timeout = 30
memory = 0
processes = 0
