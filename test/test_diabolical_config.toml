# Diabolical test config (AC, no deny)
#
# TREE:
#   test_diabolical/
#     scripts/              [allow read]
#     arena/
#       killzone/           (no grant) — empty, target for delete-recreate
#       fortress/           (no grant) — has files, rename target
#       readonly_zone/      [allow read] (was deny.write)
#       playground/         [allow all] — self-DACL escalation testing

[sandbox]
token = 'appcontainer'

[allow]
execute = ['C:\Users\H\AppData\Local\Programs\Python\Python314']
read = ['C:\Users\H\test_diabolical\scripts', 'C:\Users\H\test_diabolical\arena\readonly_zone']
all = ['C:\Users\H\test_diabolical\arena\playground']
peek = ['C:\Users\H\test_diabolical\arena']

[privileges]
child_processes = false

[environment]
inherit = true

[limit]
timeout = 60
