# Diabolical test config — targets Sandy's IMPLEMENTATION, not Windows kernel
#
# TREE:
#   test_diabolical/
#     scripts/              [allow read]
#     arena/                [allow all]
#       killzone/           [deny all]  — empty, target for delete-recreate
#       fortress/           [deny all]  — has files, rename target
#       readonly_zone/      [deny write] — partial deny
#       playground/         inherits all — self-DACL escalation testing

[sandbox]
token = 'appcontainer'

[allow]
execute = ['C:\Users\H\AppData\Local\Programs\Python\Python314']
read = ['C:\Users\H\test_diabolical\scripts']
all = ['C:\Users\H\test_diabolical\arena']

[deny]
all = [
    'C:\Users\H\test_diabolical\arena\killzone',
    'C:\Users\H\test_diabolical\arena\fortress',
]
write = ['C:\Users\H\test_diabolical\arena\readonly_zone']

[privileges]
child_processes = false

[environment]
inherit = true

[limit]
timeout = 60
