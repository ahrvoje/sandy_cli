# Sandy Sandbox Configuration
# ============================================================
# Default template. For mode-specific templates, see:
#   sandy_config_appcontainer.toml  — AppContainer mode
#   sandy_config_restricted.toml    — Restricted Token mode
#
# Only [sandbox] token is required. All other sections/keys are
# optional with safe defaults (deny-all / disabled / unlimited).
# Omitting a field never grants more access.

# ============================================================
# SANDBOX MODE (required)
# ============================================================

[sandbox]
token = 'appcontainer'     # 'appcontainer' or 'restricted'
# integrity = 'low'        # required (restricted only): 'low' or 'medium'
# workdir = 'inherit'      # optional (default: exe folder)

# ============================================================
# ACCESS — File and folder grants (optional, default: no grants)
# ============================================================
# Grant the sandboxed process access to specific folders or files.
# Use single quotes for Windows paths (no backslash escaping needed).

[allow.deep]
# peek    = []              # non-recursive: list dir + stat only (path traversal)
# read = [
#     'C:\data\config.json',          # single file
#     'C:\Python314',                 # entire folder (recursive)
# ]
# write = []
# execute = []
# append = []
# delete = []
# all = []

# [deny.deep] is NOT available in appcontainer mode (kernel ignores deny ACEs for AC SIDs)

# ============================================================
# PRIVILEGES — Optional, safe defaults shown
# ============================================================
# AppContainer: network, lan, stdin, clipboard_*, child_processes
# Restricted:   named_pipes, desktop, stdin, clipboard_*, child_processes

# [privileges]
# network = false            # default false (appcontainer only)
# lan = false                # false | 'with localhost' | 'without localhost' (appcontainer only)
# named_pipes = false        # default false (restricted only)
# desktop = true             # default true (restricted only, WinSta0 + Desktop)
# stdin = false              # default false (NUL)
# clipboard_read = false     # default false
# clipboard_write = false    # default false
# child_processes = true     # default true

# ============================================================
# REGISTRY — Registry key grants (restricted only, optional)
# ============================================================
# [registry]
# read = ['HKCU\Software\MyApp']
# write = ['HKCU\Software\MyApp\Settings']

# ============================================================
# ENVIRONMENT — Optional, defaults to filtered
# ============================================================

# [environment]
# inherit = false            # default false (clean environment)
# pass = []                  # default [] (pass no extra variables)

# ============================================================
# RESOURCE LIMITS — Optional, defaults to unlimited (0)
# ============================================================

# [limit]
# timeout = 0               # 0 = no timeout, positive = kill after N seconds
# memory = 0                # 0 = no cap, positive = limit in MB
# processes = 0             # 0 = no cap, positive = max active processes
