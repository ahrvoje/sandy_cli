# Sandy Sandbox Configuration
# ============================================================
# Default template. For mode-specific templates, see:
#   sandy_config_appcontainer.toml  — AppContainer mode
#   sandy_config_restricted.toml    — Restricted Token mode
#
# All sandbox settings are defined here.
# All [privileges] keys are mandatory and must be set explicitly.

# ============================================================
# SANDBOX MODE (required)
# ============================================================

[sandbox]
token = 'appcontainer'     # 'appcontainer' or 'restricted'
# integrity = 'low'        # required (restricted only): 'low' or 'medium'
workdir = 'inherit'        # required: absolute path or 'inherit' (= exe folder)

# ============================================================
# ACCESS — File and folder grants
# ============================================================
# Grant the sandboxed process access to specific folders or files.
# Use single quotes for Windows paths (no backslash escaping needed).

[allow]
read = []
# read = [
#     'C:\data\config.json',          # single file
#     'C:\Python314',                 # entire folder (recursive)
# ]
write = []
execute = []
append = []
delete = []
all = []

# ============================================================
# PERMISSIONS — All keys mandatory per mode
# ============================================================
# AppContainer: system_dirs, network, localhost, lan, stdin, clipboard_read, clipboard_write, child_processes
# Restricted:   named_pipes, stdin, clipboard_read, clipboard_write, child_processes

[deny]
read    = []
write   = []
execute = []
append  = []
delete  = []
all     = []

[privileges]
system_dirs = true   # read C:\Windows, Program Files (appcontainer only)
network = false      # outbound internet access            (appcontainer only)
localhost = false    # loopback connections (admin required) (appcontainer only)
lan = false          # local network access                (appcontainer only)
# named_pipes = false  # named pipe creation                 (restricted only)
stdin = false        # true = inherit, false = NUL           (both modes)
clipboard_read = false
clipboard_write = false
child_processes = true

# ============================================================
# REGISTRY — Registry key grants (restricted only)
# ============================================================
# [registry]
# read = ['HKCU\Software\MyApp']
# write = ['HKCU\Software\MyApp\Settings']

# ============================================================
# ENVIRONMENT — Control inherited variables
# ============================================================
# All settings are mandatory. No optional/hidden defaults.

[environment]
inherit = true                            # required: true or false
pass = []                                 # required: [] or ['PATH', 'PYTHONPATH']

# ============================================================
# RESOURCE LIMITS — all keys required (0 = unlimited)
# ============================================================

[limit]
timeout = 0        # 0 = no timeout, positive = kill after N seconds
memory = 0         # 0 = no cap, positive = limit in MB
processes = 0      # 0 = no cap, positive = max active processes
