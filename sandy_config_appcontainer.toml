# Sandy — AppContainer Config Template
# ============================================================
# AppContainer is the default sandbox mode. It provides kernel-enforced
# isolation with network control and object namespace isolation.
# Named pipe creation is blocked (kernel restriction).

[sandbox]
token = 'appcontainer'
workdir = 'inherit'        # required: absolute path or 'inherit' (= exe folder)

# ============================================================
# ACCESS — File and folder grants
# ============================================================
# Grant the sandboxed process access to specific folders or files.
# Use single quotes for Windows paths (no backslash escaping needed).

[allow]
peek    = []              # non-recursive: list dir + stat only (path traversal)
read = []
write = []
execute = []
append = []
delete = []
all = []

# ============================================================
# PERMISSIONS — All keys mandatory per mode
# ============================================================
# Every key must be explicitly set. Omitting a key is a parse error.

[deny]
read    = []
write   = []
execute = []
append  = []
delete  = []
all     = []

[privileges]
system_dirs     = true    # read C:\Windows, Program Files (required for most executables)
network         = false   # outbound internet access
localhost       = false   # loopback/localhost connections (admin required)
lan             = false   # local network access
stdin           = false   # true = inherit, false = disabled (NUL), or a file path
clipboard_read  = false   # allow reading from clipboard
clipboard_write = false   # allow writing to clipboard
child_processes = true    # allow spawning child processes (kernel-enforced)

# NOTE: named_pipes is not available in AppContainer mode.
# Named pipe creation is a kernel-level restriction of AppContainer.
# Use token = 'restricted' in [sandbox] if your app needs named pipes.

# NOTE: [registry] section is not available in AppContainer mode.
# AppContainer provides a fixed private registry hive automatically.

# ============================================================
# ENVIRONMENT — inherit is mandatory
# ============================================================

[environment]
inherit = true                            # required: true or false
pass = []                                 # required: [] or ['PATH', 'PYTHONPATH']

# ============================================================
# RESOURCE LIMITS — all keys required (0 = unlimited)
# ============================================================

[limit]
timeout = 0        # 0 = no timeout, positive = kill after N seconds
memory = 0         # 0 = no cap, positive = limit in MB
processes = 0      # 0 = no cap, positive = max active processes
